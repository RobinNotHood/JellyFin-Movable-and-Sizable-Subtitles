name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version (e.g. 1.0.0) - used when triggered manually'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "assembly_version=${VERSION}.0" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.MovableSubtitles/Jellyfin.Plugin.MovableSubtitles.csproj \
            --configuration Release \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} \
            -p:FileVersion=${{ steps.version.outputs.assembly_version }}

      - name: Package zip
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUT="movable-subtitles_${VERSION}.zip"
          mkdir -p dist
          cp Jellyfin.Plugin.MovableSubtitles/bin/Release/net8.0/Jellyfin.Plugin.MovableSubtitles.dll dist/
          (cd dist && zip -r "../$OUT" .)
          CHECKSUM=$(md5sum "$OUT" | awk '{print $1}')
          SIZE=$(stat -c%s "$OUT")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "zip=$OUT" >> $GITHUB_OUTPUT
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip }}

      - name: Update manifest.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
          TIMESTAMP: ${{ steps.package.outputs.timestamp }}
          ZIP: ${{ steps.package.outputs.zip }}
          REPO: ${{ github.repository }}
        run: |
          python3 .github/scripts/update_manifest.py

      - name: Commit manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add manifest.json
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "chore: update manifest for v${{ steps.version.outputs.version }}"
            git push origin main
          fi
