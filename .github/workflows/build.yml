name: Build

on:
  push:
    branches: [main]
    paths:
      - 'Jellyfin.Plugin.MovableSubtitles/**'
      - 'build.yaml'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.MovableSubtitles/Jellyfin.Plugin.MovableSubtitles.csproj

      - name: Build
        run: >
          dotnet build Jellyfin.Plugin.MovableSubtitles/Jellyfin.Plugin.MovableSubtitles.csproj
          --configuration Release
          --no-restore
          -p:ContinuousIntegrationBuild=true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.MovableSubtitles
          path: Jellyfin.Plugin.MovableSubtitles/bin/Release/net8.0/Jellyfin.Plugin.MovableSubtitles.dll
          if-no-files-found: error
