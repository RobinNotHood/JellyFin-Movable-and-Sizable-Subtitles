overview: "Menu-driven subtitle move/resize for the Jellyfin web client."
description: >-
  Adds an on-screen control panel to the Jellyfin video player for moving
  and resizing subtitles. Arrow buttons nudge the subtitles in any direction,
  A- / A+ buttons change the size, and quick preset buttons snap subtitles to
  the top, middle or bottom of the screen. Direct drag and scroll-to-resize
  on the subtitle element are still available as an opt-in in the plugin
  settings.
category: "General"
